# Redis Configuration
# NOTE: Do NOT set requirepass here — the password is injected at runtime
# via the --requirepass flag in docker-compose.yml using the REDIS_PASSWORD
# environment variable from the local .env file (gitignored).

# --- Network ---
bind 0.0.0.0
protected-mode yes
port 6379

# --- General ---
loglevel notice
databases 16

# --- Persistence: RDB snapshots ---
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
dbfilename dump.rdb
dir /data

# --- Persistence: Append Only File ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Memory ---
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Slow log ---
slowlog-log-slower-than 10000
slowlog-max-len 128
